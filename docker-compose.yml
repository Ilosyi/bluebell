services:
  mysql:
    image: mysql:8.4
    container_name: bluebell-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bluebell_root_password
      MYSQL_DATABASE: bluebell
      MYSQL_USER: bluebell
      MYSQL_PASSWORD: bluebell_password
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./models/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql:ro
      - ./deploy/mysql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ubluebell -pbluebell_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bluebell_net

  redis:
    image: redis:7.4-alpine
    container_name: bluebell-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --requirepass
      - bluebell_redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "bluebell_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bluebell_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: bluebell-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BLUEBELL_CONFIG_FILE: /app/settings/config.docker.yaml
      TZ: Asia/Shanghai
    volumes:
      - ./settings/config.docker.yaml:/app/settings/config.docker.yaml:ro
      - backend_logs:/app/logs
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/ping >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bluebell_net

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: bluebell-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - bluebell_net

volumes:
  mysql_data:
  redis_data:
  backend_logs:

networks:
  bluebell_net:
    driver: bridge
